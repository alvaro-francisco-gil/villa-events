name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # apps/web reads these at build time. CI uses placeholders so `next build`
  # doesn't fail on missing env vars; the build never talks to Firebase.
  NEXT_PUBLIC_FIREBASE_API_KEY: ci-placeholder
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ci.example.com
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ci-placeholder
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ci.example.com
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: '0'
  NEXT_PUBLIC_FIREBASE_APP_ID: ci-placeholder

jobs:
  ci:
    name: Lint, typecheck, unit, build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Lint (web)
        run: pnpm lint

      - name: Typecheck (shared, web, functions)
        run: pnpm typecheck

      - name: Test (unit — shared + functions)
        run: pnpm test

      - name: Build (shared, web, functions)
        run: pnpm build

  emulator-tests:
    name: Emulator tests (integration + rules + functions)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.24.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java (Firebase emulators)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          # firebase-tools@15 will drop support for Java < 21; bumping ahead
          # of the deprecation removes the runtime warning and keeps the
          # emulator job working when firebase-tools rolls forward.
          java-version: '21'

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build functions
        run: pnpm functions:build

      - name: Integration tests (@cultuvilla/shared)
        run: pnpm test:integration

      - name: Firestore rules tests
        run: pnpm test:rules

      - name: Cloud Functions tests
        run: pnpm test:functions
